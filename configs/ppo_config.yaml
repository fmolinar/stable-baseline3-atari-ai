defaults:
  learning_rate: 2.5e-4
  n_steps: 128
  batch_size: 256
  n_epochs: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.1
  ent_coef: 0.01
  vf_coef: 0.5
  max_grad_norm: 0.5
  n_envs: 8

experiments:
  - name: ppo_default
    learning_rate: 2.5e-4
    n_steps: 128
    batch_size: 256
    gamma: 0.99
    ent_coef: 0.01
    n_envs: 8

  - name: ppo_small_batch
    learning_rate: 2.5e-4
    n_steps: 128
    batch_size: 64
    gamma: 0.99
    ent_coef: 0.01
    n_envs: 4

  - name: ppo_low_entropy
    learning_rate: 2.5e-4
    n_steps: 128
    batch_size: 256
    gamma: 0.99
    ent_coef: 0.001
    n_envs: 8
