defaults:
  learning_rate: 1.0e-4
  batch_size: 32
  buffer_size: 100000
  gamma: 0.99
  target_update_interval: 1000
  exploration_fraction: 0.1
  exploration_final_eps: 0.01
  train_freq: 4
  gradient_steps: 1
  optimize_memory_usage: false

experiments:
  - name: dqn_lr_low
    learning_rate: 1.0e-4
    batch_size: 32
    buffer_size: 100000
    gamma: 0.99
    target_update_interval: 1000

  - name: dqn_lr_high
    learning_rate: 1.0e-3
    batch_size: 32
    buffer_size: 100000
    gamma: 0.99
    target_update_interval: 1000

  - name: dqn_large_buffer
    learning_rate: 1.0e-4
    batch_size: 64
    buffer_size: 500000
    gamma: 0.99
    target_update_interval: 5000

  - name: dqn_low_gamma
    learning_rate: 1.0e-4
    batch_size: 32
    buffer_size: 100000
    gamma: 0.95
    target_update_interval: 1000
